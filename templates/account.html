{% extends "base.html" %}

{% block content %}
<section class="panel narrow account-panel">
  <div class="section-header account-header">
    <div>
      <h2>Your account</h2>
      <p class="subtle">Signed in as <strong>{{ account_user.username }}</strong></p>
    </div>
    <span class="badge">{{ account_user.role }}</span>
  </div>

  <form method="post" action="/account/password" class="stack-form account-password-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <div class="account-password-grid account-password-stack">
    <label>
      <span>Current password</span>
      <input type="password" name="current_password" required />
    </label>
    <label>
      <span>New password</span>
      <input type="password" name="new_password" required />
    </label>
    <label class="full-span-field">
      <span>Confirm new password</span>
      <input type="password" name="confirm_password" required />
    </label>
    </div>
    <div class="button-row account-actions">
      <button type="submit">Change password</button>
    </div>
  </form>
</section>
{% endblock %}
